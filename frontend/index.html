<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tmiix</title>
    <style>
      :root {
        --color-background: #0d1117;
        --color-foreground: #c9d1d9;
        background: transparent;
        color: var(--color-foreground);
        color-scheme: dark;
      }

      html,
      body,
      #root {
        background: transparent;
        color: var(--color-foreground);
        margin: 0;
        min-height: 100%;
      }

      body {
        overflow: hidden;
      }
    </style>
    <script>
      // Match the first document paint to the stored UI theme before the app bundle runs.
      (function () {
        try {
          var stored = window.localStorage.getItem('tmiix.ui.theme') || 'system'
          var resolved = stored
          if (stored === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          var isLight = resolved === 'light'
          var background = isLight ? '#ffffff' : '#0d1117'
          var foreground = isLight ? '#24292f' : '#c9d1d9'
          var root = document.documentElement
          root.style.setProperty('--color-background', background)
          root.style.setProperty('--color-foreground', foreground)
          root.style.setProperty('color-scheme', isLight ? 'light' : 'dark')
          root.style.background = 'transparent'
          root.style.color = foreground
        } catch (_) {
          /* ignore */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
